<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>~*~ KEVIN DANCE ~*~</title>
<style>
  body {
    margin: 0;
    background: #ffcc00;
    background-image:
      repeating-linear-gradient(45deg, #ffcc00 0 20px, #ffaa00 20px 40px);
    font-family: "Comic Sans MS", cursive;
    color: #000080;
    text-align: center;
    overflow-x: hidden;
  }
  h1 {
    font-size: 56px;
    color: #ff0066;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 #000080;
    margin: 14px 0 4px;
    letter-spacing: 2px;
  }
  .sub {
    font-size: 18px;
    color: #000080;
    font-weight: bold;
  }
  .midi {
    background: #000;
    color: #00ff00;
    font-family: "Courier New", monospace;
    border: 3px ridge #fff;
    display: inline-block;
    padding: 6px 12px;
    margin: 8px;
    font-size: 13px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    padding: 14px;
  }
  .grid img {
    width: 100%;
    height: auto;
    border: 2px solid #ff0066;
    animation: bounce 0.6s ease-in-out infinite alternate;
  }
  .grid img:nth-child(2n)  { animation-delay: 0.1s; }
  .grid img:nth-child(3n)  { animation-delay: 0.2s; }
  .grid img:nth-child(5n)  { animation-delay: 0.3s; }
  .grid img:nth-child(7n)  { animation-delay: 0.4s; }
  @keyframes bounce {
    from { transform: translateY(0)   rotate(-3deg); }
    to   { transform: translateY(-12px) rotate(3deg); }
  }
  .blink { animation: blink 1s steps(2,start) infinite; }
  @keyframes blink { to { visibility: hidden; } }
  a { color: #000080; font-weight: bold; }

  /* Full-screen dancing hamster overlay (click to play) */
  #dancecorner {
    position: fixed;
    inset: 0;
    z-index: 100;
    cursor: pointer;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    transition: opacity 0.5s ease;
  }
  #dancecorner.dismissed {
    opacity: 0;
    pointer-events: none;
  }
  .dance-bubble {
    background: #fff;
    border: 3px solid #ff0066;
    border-radius: 18px;
    padding: 14px 28px;
    font-size: 26px;
    color: #000080;
    font-weight: bold;
    margin: 0 auto 28px;
    display: inline-block;
    box-shadow: 4px 4px 0 #ff0066, 0 0 24px rgba(255, 0, 102, 0.4);
    animation: bubblePulse 0.45s ease-in-out infinite alternate;
    position: relative;
    text-align: center;
    line-height: 1.2;
  }
  .dance-bubble small {
    display: block;
    font-size: 14px;
    color: #ff0066;
    margin-top: 4px;
    font-weight: bold;
  }
  .dance-bubble::after {
    content: "";
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 14px solid #ff0066;
  }
  @keyframes bubblePulse {
    from { transform: scale(1);    }
    to   { transform: scale(1.06); }
  }
  .dance-trio {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 8px;
  }
  .dh {
    display: inline-block;
    line-height: 1;
    filter: drop-shadow(0 0 14px #ff66cc) drop-shadow(0 6px 8px rgba(0, 0, 0, 0.4));
    animation: hamDance 0.45s ease-in-out infinite alternate;
  }
  .dh.s1 { animation-delay: 0s;    font-size: 160px; }
  .dh.s2 { animation-delay: 0.15s; font-size: 220px; }
  .dh.s3 { animation-delay: 0.30s; font-size: 130px; }
  @keyframes hamDance {
    from { transform: translateY(0)    rotate(-12deg); }
    to   { transform: translateY(-32px) rotate(12deg);  }
  }

  @media (max-width: 720px) {
    h1 { font-size: 36px; }
    .sub { font-size: 14px; }
    .grid { grid-template-columns: repeat(4, 1fr); padding: 8px; gap: 4px; }
    .dance-bubble { font-size: 18px; padding: 10px 18px; margin-bottom: 18px; }
    .dance-bubble small { font-size: 11px; }
    .dh.s1 { font-size: 90px;  }
    .dh.s2 { font-size: 120px; }
    .dh.s3 { font-size: 72px;  }
  }
</style>
</head>

<script>
(function () {
  var corner = document.getElementById('dancecorner');
  var audio  = document.querySelector('audio');
  if (!corner || !audio) return;
  function dismiss() {
    corner.classList.add('dismissed');
    setTimeout(function () { corner.remove(); }, 600);
  }
  corner.addEventListener('click', function () {
    var p = audio.play();
    if (p && typeof p.then === 'function') {
      p.then(dismiss).catch(function () { dismiss(); });
    } else {
      dismiss();
    }
  });
})();
</script>
