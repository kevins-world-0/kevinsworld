<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>~*~ KEVIN DANCE ~*~</title>
<style>
  body {
    margin: 0;
    background: #ffcc00;
    background-image:
      repeating-linear-gradient(45deg, #ffcc00 0 20px, #ffaa00 20px 40px);
    font-family: "Comic Sans MS", cursive;
    color: #000080;
    text-align: center;
    overflow-x: hidden;
  }
  h1 {
    font-size: 56px;
    color: #ff0066;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 #000080;
    margin: 14px 0 4px;
    letter-spacing: 2px;
  }
  .sub {
    font-size: 18px;
    color: #000080;
    font-weight: bold;
  }
  .midi {
    background: #000;
    color: #00ff00;
    font-family: "Courier New", monospace;
    border: 3px ridge #fff;
    display: inline-block;
    padding: 6px 12px;
    margin: 8px;
    font-size: 13px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    padding: 14px;
  }
  .grid img {
    width: 100%;
    height: auto;
    border: 2px solid #ff0066;
    animation: bounce 0.6s ease-in-out infinite alternate;
  }
  .grid img:nth-child(2n)  { animation-delay: 0.1s; }
  .grid img:nth-child(3n)  { animation-delay: 0.2s; }
  .grid img:nth-child(5n)  { animation-delay: 0.3s; }
  .grid img:nth-child(7n)  { animation-delay: 0.4s; }
  @keyframes bounce {
    from { transform: translateY(0)   rotate(-3deg); }
    to   { transform: translateY(-12px) rotate(3deg); }
  }
  .blink { animation: blink 1s steps(2,start) infinite; }
  @keyframes blink { to { visibility: hidden; } }
  a { color: #000080; font-weight: bold; }

  /* Dancing hamster cutout (foreground, click to play) */
  #dancecorner {
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 100;
    cursor: pointer;
    user-select: none;
    text-align: center;
  }
  .dance-bubble {
    background: #fff;
    border: 2px solid #ff0066;
    border-radius: 14px;
    padding: 6px 10px;
    font-size: 13px;
    color: #000080;
    font-weight: bold;
    margin: 0 auto 8px;
    display: inline-block;
    box-shadow: 2px 2px 0 #ff0066;
    animation: bubblePulse 0.45s ease-in-out infinite alternate;
    position: relative;
  }
  .dance-bubble::after {
    content: "";
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid #ff0066;
  }
  @keyframes bubblePulse {
    from { transform: scale(1);    }
    to   { transform: scale(1.06); }
  }
  .dance-trio {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
    height: 100px;
  }
  .dh {
    display: inline-block;
    font-size: 72px;
    line-height: 1;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.35));
    animation: hamDance 0.45s ease-in-out infinite alternate;
  }
  .dh.s1 { animation-delay: 0s;    font-size: 68px; }
  .dh.s2 { animation-delay: 0.15s; font-size: 88px; }
  .dh.s3 { animation-delay: 0.30s; font-size: 56px; }
  @keyframes hamDance {
    from { transform: translateY(0)   rotate(-10deg); }
    to   { transform: translateY(-18px) rotate(10deg); }
  }
  #dancecorner.playing .dance-bubble { display: none; }
  #dancecorner.playing .dh {
    filter: drop-shadow(0 0 10px #00ff66) drop-shadow(0 0 4px #ffff00);
  }

  @media (max-width: 720px) {
    h1 { font-size: 36px; }
    .sub { font-size: 14px; }
    .grid { grid-template-columns: repeat(4, 1fr); padding: 8px; gap: 4px; }
  }
</style>
</head>
<body>

<script>
(function () {
  var corner = document.getElementById('dancecorner');
  var audio  = document.querySelector('audio');
  if (!corner || !audio) return;
  corner.addEventListener('click', function () {
    if (audio.paused) {
      audio.play().then(function () { corner.classList.add('playing'); });
    } else {
      audio.pause();
      corner.classList.remove('playing');
    }
  });
  audio.addEventListener('play',  function () { corner.classList.add('playing');  });
  audio.addEventListener('pause', function () { corner.classList.remove('playing'); });
})();
</script>
